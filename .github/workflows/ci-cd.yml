name: CI/CD with DevSecOps for Restaurant Service

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code (Corrected action)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # SonarCloud Scan (SAST)
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=Nimesha4_restaurant-order-management-backend
            -Dsonar.organization=nimesha4
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=.

      # Docker Login
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Build Docker Image
      - name: Build Docker image
        run: docker build -t nimesha4/restaurant-order-management-backend:latest .

      # Push Docker Image
      - name: Push Docker image to Docker Hub
        run: docker push nimesha4/restaurant-order-management-backend:latest
