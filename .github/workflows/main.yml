name: CI for Order Service

on:
  push:
    branches:
      - dev


jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout main repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Clone Kubernetes Config Repository
      - name: Clone Kubernetes Config Repository
        uses: actions/checkout@v3
        with:
          repository: Deliveroo-System/ds-project-kubernetes
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          path: kubernetes
          
      # SonarCloud Scan (SAST)
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=Nimesha4_restaurant-order-management-backend
            -Dsonar.organization=nimesha4
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=.

      # Step 3: Login to Docker Hub (FIXED - no echo issues)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 4: Build Docker image
      - name: Build Docker image
        run: docker build -f Dockerfile -t vidura12/deliveroo:order-service-latest .

      # Step 5: Push Docker image
      - name: Push Docker image
        run: docker push vidura12/deliveroo:order-service-latest
