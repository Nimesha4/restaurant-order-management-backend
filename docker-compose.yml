version: '3.8'

services:
  order-service:
    build: .
    ports:
      - "8002:8002"
    environment:
      - PORT=8002
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - .:/app
    command: npm run dev
    depends_on:
      - mongo

  api-gateway:
    image: your-gateway-image
    ports:
      - "5000:5000"
    depends_on:
      - order-service

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: